# Spoke whose landing the site root ("/") redirects to. This is the only
# content served at the bucket root now that there is no standalone hub
# landing — the root deploy emits a single index.html forwarding here.
rootRedirectSpoke: genai

spokes:
  - repo: AlexanderBarabanov/openvino.genai
    ref: master
    id: genai
    routeBasePath: genai
    paths:
      - docs/
      - docs-versions/
      - samples/
    prebuildCommands:
      - generate-samples-docs:genai-samples-docs-plugin

  - repo: AlexanderBarabanov/openvino
    ref: master
    id: openvino
    routeBasePath: openvino
    paths:
      - docs/
      - docs-versions/

  - repo: AlexanderBarabanov/physicalai
    ref: main
    id: physicalai
    routeBasePath: physicalai
    paths:
      - docs/
      - docs-versions/
