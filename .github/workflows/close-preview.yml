name: Close Documentation Preview

# Removes the dev-bucket preview folder for a closed/abandoned PR.
#
# Dispatch payload (`client_payload` for repository_dispatch, `inputs` for
# workflow_dispatch) MUST include:
#   source_repo  e.g. "openvinotoolkit/openvino.genai" — used only for the
#                spoke allowlist; the cleanup itself is keyed on pr_number.
#   pr_number    Pull request that owned the preview folder pr/<N>/.
#
# Triggered by the spoke when a PR is closed without merging. For merged
# PRs, the publish-preview workflow already deletes pr/<N>/ as part of its
# merge-mode deploy, so dispatching close-preview after merge is harmless
# (it just re-runs `aws s3 rm` against an empty prefix).

on:
  repository_dispatch:
    types: [close-preview]
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository (owner/repo)'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-dev-${{ github.event.client_payload.source_repo || inputs.source_repo }}-${{ github.event.client_payload.pr_number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  validate-input:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pr_number: ${{ steps.validate.outputs.pr_number }}
      spoke_id: ${{ steps.validate.outputs.spoke_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/validate-dispatch
          persist-credentials: false
      - id: validate
        uses: ./.github/actions/validate-dispatch
        with:
          event_type: close-preview
          source_repo: ${{ github.event.client_payload.source_repo || inputs.source_repo }}
          pr_number:   ${{ github.event.client_payload.pr_number   || inputs.pr_number }}
          sender_login: ${{ github.event.sender.login }}
          sender_id:    ${{ github.event.sender.id }}
          sender_type:  ${{ github.event.sender.type }}
          is_repository_dispatch: ${{ github.event_name == 'repository_dispatch' }}
          approved_sender_login: ${{ secrets.APPROVED_BOT_LOGIN }}
          approved_sender_id: ${{ secrets.APPROVED_BOT_ID }}
          approved_sender_type: ${{ secrets.APPROVED_BOT_TYPE }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    runs-on: ubuntu-latest
    needs: validate-input
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/aws-deploy
          persist-credentials: false
      - name: Remove preview folder
        uses: ./.github/actions/aws-deploy
        with:
          role:   ${{ secrets.DEV_ROLE }}
          bucket: ${{ secrets.DEV_BUCKET }}
          path:   pr/${{ needs.validate-input.outputs.spoke_id }}/${{ needs.validate-input.outputs.pr_number }}
          mode:   rm
