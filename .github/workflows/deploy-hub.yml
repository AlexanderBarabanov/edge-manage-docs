name: Deploy Hub

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
  workflow_call:
    inputs:
      target_environment:
        description: 'dev or prod (selects AWS secrets).'
        type: string
        required: false
        default: ''
      target_path:
        description: 'S3 prefix to deploy hub root into (no leading slash). Empty = bucket root.'
        type: string
        required: false
        default: ''
      site_url:
        description: 'Override SITE_URL.'
        type: string
        required: false
        default: ''
      base_url:
        description: 'Override BASE_URL (defaults to "/<target_path>/" or "/").'
        type: string
        required: false
        default: ''

permissions: {}

concurrency:
  group: deploy-hub-${{ inputs.target_environment || (startsWith(github.ref, 'refs/tags/') && 'prod' || 'dev') }}-${{ inputs.target_path || 'root' }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hub_changed: ${{ steps.decide.outputs.hub_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: changes
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@2f7c5bfce28377bc069a65ba478de0a74aa0ca32 # v46.0.1
        with:
          files_yaml: |
            hub:
              - docusaurus.config.ts
              - sidebars/**
              - src/**
              - static/**
              - spokes.yml
              - package.json
              - package-lock.json
              - tsconfig.json
              - .github/workflows/deploy-hub.yml
              - .github/actions/**
      - id: decide
        env:
          PUSH_RESULT: ${{ steps.changes.outputs.hub_any_changed }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "hub_changed=${PUSH_RESULT}" >> "$GITHUB_OUTPUT"
          else
            echo "hub_changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.hub_changed == 'true'
    permissions:
      id-token: write
      contents: read
    env:
      IS_PROD: ${{ inputs.target_environment == 'prod' || (inputs.target_environment == '' && startsWith(github.ref, 'refs/tags/')) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          persist-credentials: false
      - uses: ./.github/actions/setup-build
      - name: Resolve deploy parameters
        id: params
        env:
          INPUT_SITE_URL: ${{ inputs.site_url }}
          INPUT_BASE_URL: ${{ inputs.base_url }}
          INPUT_TARGET_PATH: ${{ inputs.target_path }}
          DEFAULT_SITE_URL: ${{ env.IS_PROD == 'true' && secrets.PROD_URL || secrets.DEV_URL }}
          AWS_ROLE: ${{ env.IS_PROD == 'true' && secrets.PROD_ROLE || secrets.DEV_ROLE }}
          BUCKET:   ${{ env.IS_PROD == 'true' && secrets.PROD_BUCKET || secrets.DEV_BUCKET }}
        run: |
          set -euo pipefail
          site_url="${INPUT_SITE_URL:-$DEFAULT_SITE_URL}"
          target_path="${INPUT_TARGET_PATH%/}"
          if [[ -n "$INPUT_BASE_URL" ]]; then
            base_url="$INPUT_BASE_URL"
          elif [[ -n "$target_path" ]]; then
            base_url="/$target_path/"
          else
            base_url="/"
          fi
          {
            echo "site_url=$site_url"
            echo "base_url=$base_url"
            echo "target_path=$target_path"
            echo "aws_role=$AWS_ROLE"
            echo "bucket=$BUCKET"
          } >> "$GITHUB_OUTPUT"
      - name: Build hub-only docs
        env:
          HUB_ONLY: '1'
          SITE_URL: ${{ steps.params.outputs.site_url }}
          BASE_URL: ${{ steps.params.outputs.base_url }}
        run: npm run build
      - name: Build excludes for hub-root sync
        id: excludes
        env:
          TARGET_PATH: ${{ steps.params.outputs.target_path }}
        run: |
          set -euo pipefail
          {
            echo "patterns<<EOF"
            # Preserve spoke subtrees at any prefix.
            yq -r '.spokes[].routeBasePath | . + "/*"' spokes.yml
            # At bucket root only, also preserve the PR preview tree.
            if [[ -z "$TARGET_PATH" ]]; then
              echo "pr/*"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Deploy hub
        uses: ./.github/actions/aws-deploy
        with:
          role:     ${{ steps.params.outputs.aws_role }}
          bucket:   ${{ steps.params.outputs.bucket }}
          path:     ${{ steps.params.outputs.target_path }}
          excludes: ${{ steps.excludes.outputs.patterns }}
          delete:   ${{ steps.params.outputs.target_path == '' }}
