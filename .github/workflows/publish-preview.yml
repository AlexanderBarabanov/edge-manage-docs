name: Publish Documentation (Dev)

# Handles both PR previews and post-merge deploys to the dev bucket.
#
# Dispatch payload (`client_payload` for repository_dispatch, `inputs` for
# workflow_dispatch) MUST include:
#   source_repo  e.g. "openvinotoolkit/openvino.genai"
#   pr_number    PR that produced or owned this commit (used for the
#                preview path AND for cleanup on merge)
#   branch       PR head branch for previews; "main" or "master" for merges
#   commit_sha   40-char hex
#
# Mode is derived from `branch`:
#   - branch ∈ {main, master} → MERGE mode
#       Single-spoke build deployed to <DEV_BUCKET>/<spoke>/, the open-PR
#       preview at /pr/<spoke>/<N>/ is removed, and a chained
#       `publish-hub` job (workflow_call into publish-hub.yml) republishes
#       the hub root so the spokes index reflects the new state.
#   - otherwise              → PREVIEW mode
#       Full multi-spoke build with this spoke overridden to <commit_sha>
#       deployed to <DEV_BUCKET>/pr/<spoke>/<N>/.

on:
  repository_dispatch:
    types: [deploy-preview]
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository (owner/repo)'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: string
      branch:
        description: 'Branch (main/master => merge mode, otherwise => preview mode)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA (40 hex chars)'
        required: true
        type: string

permissions: {}

# Serialise dev-bucket writes for the same spoke so a merge-mode deploy
# never races a preview-mode deploy of the same PR.
concurrency:
  group: publish-dev-${{ github.event.client_payload.source_repo || inputs.source_repo }}-${{ github.event.client_payload.pr_number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  validate-input:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_repo: ${{ steps.validate.outputs.source_repo }}
      repo_owner: ${{ steps.validate.outputs.repo_owner }}
      repo_name: ${{ steps.validate.outputs.repo_name }}
      pr_number: ${{ steps.validate.outputs.pr_number }}
      branch: ${{ steps.validate.outputs.branch }}
      commit_sha: ${{ steps.validate.outputs.commit_sha }}
      mode: ${{ steps.validate.outputs.mode }}
      spoke_id: ${{ steps.validate.outputs.spoke_id }}
      spoke_route_base_path: ${{ steps.validate.outputs.spoke_route_base_path }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/validate-dispatch
          persist-credentials: false
      - id: validate
        uses: ./.github/actions/validate-dispatch
        with:
          event_type: deploy-preview
          source_repo: ${{ github.event.client_payload.source_repo || inputs.source_repo }}
          pr_number:   ${{ github.event.client_payload.pr_number   || inputs.pr_number }}
          branch:      ${{ github.event.client_payload.branch      || inputs.branch }}
          commit_sha:  ${{ github.event.client_payload.commit_sha  || inputs.commit_sha }}
          sender_login: ${{ github.event.sender.login }}
          sender_id:    ${{ github.event.sender.id }}
          sender_type:  ${{ github.event.sender.type }}
          is_repository_dispatch: ${{ github.event_name == 'repository_dispatch' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  comment-build-starting:
    runs-on: ubuntu-latest
    needs: validate-input
    # No PR comment for merge mode — the PR is closed and a new comment
    # would just be noise. Merge-mode status is visible in workflow runs.
    if: needs.validate-input.outputs.mode == 'preview'
    permissions:
      contents: read
    environment:
      name: publish-preview
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/pr-comment
          persist-credentials: false
      - uses: ./.github/actions/pr-comment
        with:
          app_id:      ${{ secrets.DOC_HELPER_APP_ID }}
          private_key: ${{ secrets.DOC_HELPER_APP_PRIVATE_KEY }}
          owner:       ${{ needs.validate-input.outputs.repo_owner }}
          repo:        ${{ needs.validate-input.outputs.repo_name }}
          pr_number:   ${{ needs.validate-input.outputs.pr_number }}
          body: "🔄 Building documentation preview for commit `${{ needs.validate-input.outputs.commit_sha }}`..."

  build-and-deploy:
    runs-on: ubuntu-latest
    needs:
      - validate-input
      - comment-build-starting
    # comment-build-starting is skipped on merge — `always()` lets us still
    # depend on the order without the skip propagating.
    if: |
      always() &&
      needs.validate-input.result == 'success' &&
      (needs.comment-build-starting.result == 'success' || needs.comment-build-starting.result == 'skipped')
    permissions:
      id-token: write
      contents: read
    env:
      DEV_URL: ${{ secrets.DEV_URL }}
    steps:
      # Local composite actions can only be resolved after the repo is
      # checked out. `setup-build` will then redo a full checkout.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          persist-credentials: false

      - uses: ./.github/actions/setup-build

      - name: Build docs (preview — full multi-spoke build)
        if: needs.validate-input.outputs.mode == 'preview'
        env:
          # clone-spokes.sh reads SPOKE_OVERRIDES so the override survives
          # the implicit prebuild step invoked by `npm run build`.
          SPOKE_OVERRIDES: ${{ needs.validate-input.outputs.source_repo }}:${{ needs.validate-input.outputs.commit_sha }}
          SITE_URL: ${{ env.DEV_URL }}
          # Preview path is namespaced by spoke so two PRs sharing the same
          # number across different spoke repos don't collide.
          BASE_URL: /pr/${{ needs.validate-input.outputs.spoke_id }}/${{ needs.validate-input.outputs.pr_number }}
        run: npm run build

      - name: Build docs (merge — single-spoke build)
        if: needs.validate-input.outputs.mode == 'merge'
        # Restrict the clone to the merged spoke; the config sees one
        # checkout on disk and produces a single-spoke build mounted at /.
        # The hub root is republished by the downstream `publish-hub` job
        # (which calls publish-hub.yml — single source of truth for hub
        # publishing).
        env:
          SPOKE_OVERRIDES: ${{ needs.validate-input.outputs.source_repo }}:${{ needs.validate-input.outputs.commit_sha }}
          ONLY_SPOKES: ${{ needs.validate-input.outputs.spoke_id }}
          SITE_URL: ${{ env.DEV_URL }}
          BASE_URL: /${{ needs.validate-input.outputs.spoke_route_base_path }}
        run: npm run build

      - name: Deploy preview to <bucket>/pr/<spoke>/<N>/
        if: needs.validate-input.outputs.mode == 'preview'
        uses: ./.github/actions/aws-deploy
        with:
          role:   ${{ secrets.DEV_ROLE }}
          bucket: ${{ secrets.DEV_BUCKET }}
          path:   pr/${{ needs.validate-input.outputs.spoke_id }}/${{ needs.validate-input.outputs.pr_number }}

      - name: Deploy merged spoke to <bucket>/<spoke>/
        if: needs.validate-input.outputs.mode == 'merge'
        uses: ./.github/actions/aws-deploy
        with:
          role:   ${{ secrets.DEV_ROLE }}
          bucket: ${{ secrets.DEV_BUCKET }}
          path:   ${{ needs.validate-input.outputs.spoke_route_base_path }}

      - name: Clean up old preview (merge only)
        if: needs.validate-input.outputs.mode == 'merge'
        uses: ./.github/actions/aws-deploy
        with:
          role:   ${{ secrets.DEV_ROLE }}
          bucket: ${{ secrets.DEV_BUCKET }}
          path:   pr/${{ needs.validate-input.outputs.spoke_id }}/${{ needs.validate-input.outputs.pr_number }}
          mode:   rm

  publish-hub:
    # On merge, republish the hub root through publish-hub.yml so the
    # spokes index reflects the new spoke deployment. Reusing that
    # workflow keeps a single source of truth for hub publishing.
    needs:
      - validate-input
      - build-and-deploy
    if: needs.validate-input.outputs.mode == 'merge' && needs.build-and-deploy.result == 'success'
    # Permissions for a called reusable workflow are upper-bounded by what
    # the caller grants. Match the union of permissions requested by
    # publish-hub.yml's jobs (detect-changes + build-and-deploy).
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    uses: ./.github/workflows/publish-hub.yml
    secrets:
      DEV_ROLE: ${{ secrets.DEV_ROLE }}
      DEV_BUCKET: ${{ secrets.DEV_BUCKET }}
      DEV_URL: ${{ secrets.DEV_URL }}

  comment-build-success:
    runs-on: ubuntu-latest
    needs:
      - validate-input
      - build-and-deploy
    if: needs.validate-input.outputs.mode == 'preview' && needs.build-and-deploy.result == 'success'
    permissions:
      contents: read
    environment:
      name: publish-preview
    env:
      DEV_URL: ${{ secrets.DEV_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/pr-comment
          persist-credentials: false
      - uses: ./.github/actions/pr-comment
        with:
          app_id:      ${{ secrets.DOC_HELPER_APP_ID }}
          private_key: ${{ secrets.DOC_HELPER_APP_PRIVATE_KEY }}
          owner:       ${{ needs.validate-input.outputs.repo_owner }}
          repo:        ${{ needs.validate-input.outputs.repo_name }}
          pr_number:   ${{ needs.validate-input.outputs.pr_number }}
          edit_last:   'true'
          body: |
            ✅ Documentation preview deployed for commit `${{ needs.validate-input.outputs.commit_sha }}`

            Preview: ${{ env.DEV_URL }}/pr/${{ needs.validate-input.outputs.spoke_id }}/${{ needs.validate-input.outputs.pr_number }}/
