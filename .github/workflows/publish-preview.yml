name: Deploy Documentation Preview

on:
  repository_dispatch:
    types: [deploy-preview]
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository (owner/repo)'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA (40 hex chars)'
        required: true
        type: string

permissions: {} # No permissions by default on workflow level

env:
  DEV_ROLE: ${{ secrets.DEV_ROLE }}
  DEV_BUCKET: ${{ secrets.DEV_BUCKET }}
  DEV_URL: ${{ secrets.DEV_URL }}

jobs:
  validate-input:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_repo: ${{ steps.validate.outputs.source_repo }}
      repo_owner: ${{ steps.validate.outputs.repo_owner }}
      repo_name: ${{ steps.validate.outputs.repo_name }}
      pr_number: ${{ steps.validate.outputs.pr_number }}
      commit_sha: ${{ steps.validate.outputs.commit_sha }}
    steps:
      - name: Checkout hub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: spokes.yml
          persist-credentials: false

      - name: Validate input
        id: validate
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo || inputs.source_repo }}
          PR_NUM: ${{ github.event.client_payload.pr_number || inputs.pr_number }}
          COMMIT_SHA: ${{ github.event.client_payload.commit_sha || inputs.commit_sha }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          SENDER_ID: ${{ github.event.sender.id }}
          SENDER_TYPE: ${{ github.event.sender.type }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Validation Starting ==="
          echo ""

          # Verify sender authentication FIRST
          APPROVED_SENDER="test-ov-doc-manager[bot]"
          APPROVED_SENDER_ID="276340820"
          APPROVED_SENDER_TYPE="Bot"

          echo "Request from: $SENDER_LOGIN (ID: $SENDER_ID, Type: $SENDER_TYPE)"

          if [ -z "$SENDER_LOGIN" ]; then
            echo "Error: Sender information missing"
            exit 1
          fi

          if [ "$SENDER_LOGIN" != "$APPROVED_SENDER" ]; then
            echo "Error: Sender '$SENDER_LOGIN' not approved (expected: $APPROVED_SENDER)"
            exit 1
          fi

          if [ "$SENDER_ID" != "$APPROVED_SENDER_ID" ]; then
            echo "Error: Sender ID mismatch (expected: $APPROVED_SENDER_ID, got: $SENDER_ID)"
            exit 1
          fi

          if [ "$SENDER_TYPE" != "$APPROVED_SENDER_TYPE" ]; then
            echo "Error: Sender type mismatch (expected: $APPROVED_SENDER_TYPE, got: $SENDER_TYPE)"
            exit 1
          fi

          echo "✅ Sender authenticated"

          # Validate payload structure and format
          REQUIRED_FIELDS=("source_repo" "pr_number" "commit_sha")

          for field in "${REQUIRED_FIELDS[@]}"; do
            if ! echo "$CLIENT_PAYLOAD" | jq -e ".$field" > /dev/null 2>&1; then
              echo "Error: Required field '$field' missing"
              exit 1
            fi
          done

          if ! [[ "$PR_NUM" =~ ^[0-9]+$ ]] || [ "$PR_NUM" -lt 1 ]; then
            echo "Error: Invalid PR number: $PR_NUM"
            exit 1
          fi

          if ! [[ "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Error: Invalid commit SHA: $COMMIT_SHA"
            exit 1
          fi

          if ! [[ "$SOURCE_REPO" =~ ^[a-zA-Z0-9_-]+/[a-zA-Z0-9._-]+$ ]]; then
            echo "Error: Invalid repository format: $SOURCE_REPO"
            exit 1
          fi

          echo "✅ Payload structure validated"

          # Validate source repository against spokes.yml
          if command -v yq &>/dev/null; then
            APPROVED_REPOS=($(yq -r '.spokes[].repo' spokes.yml))
          else
            APPROVED_REPOS=()
            while IFS= read -r line; do
              if [[ "$line" =~ repo:\ *(.*) ]]; then
                APPROVED_REPOS+=("${BASH_REMATCH[1]}")
              fi
            done < spokes.yml
          fi

          REPO_APPROVED=false
          for repo in "${APPROVED_REPOS[@]}"; do
            if [ "$repo" == "$SOURCE_REPO" ]; then
              REPO_APPROVED=true
              break
            fi
          done

          if [ "$REPO_APPROVED" != "true" ]; then
            echo "Error: Repository '$SOURCE_REPO' not in approved list"
            echo "Approved repositories:"
            printf '%s\n' "${APPROVED_REPOS[@]}"
            exit 1
          fi

          echo "✅ Source repository validated"

          # Verify commit SHA with GitHub API
          if ! gh api "repos/$SOURCE_REPO/commits/$COMMIT_SHA" --silent 2>/dev/null; then
            echo "Error: Commit SHA does not exist in repository"
            exit 1
          fi
          echo "✅ Commit exists"

          # Verify PR and commit match
          PR_HEAD=$(gh api "repos/$SOURCE_REPO/pulls/$PR_NUM" --jq '.head.sha' 2>/dev/null || echo "")

          if [ -z "$PR_HEAD" ]; then
            echo "Error: PR #$PR_NUM does not exist"
            exit 1
          fi

          if [ "$PR_HEAD" != "$COMMIT_SHA" ]; then
            echo "Error: Commit SHA mismatch (PR head: $PR_HEAD, received: $COMMIT_SHA)"
            exit 1
          fi

          # Verify PR is open
          PR_STATE=$(gh api "repos/$SOURCE_REPO/pulls/$PR_NUM" --jq '.state')
          if [ "$PR_STATE" != "open" ]; then
            echo "Error: PR #$PR_NUM is not open (state: $PR_STATE)"
            exit 1
          fi
          echo "✅ Commit verified in PR #$PR_NUM"

          echo ""
          echo "=== All Validations Passed ==="
          echo "Repository: $SOURCE_REPO"
          echo "PR: #$PR_NUM"
          echo "Commit: $COMMIT_SHA"

          # Extract owner and repo name for downstream jobs
          REPO_OWNER="${SOURCE_REPO%/*}"
          REPO_NAME="${SOURCE_REPO#*/}"

          echo "source_repo=$SOURCE_REPO" >> $GITHUB_OUTPUT
          echo "repo_owner=$REPO_OWNER" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

  post-comment-pre-build:
    runs-on: ubuntu-latest
    needs: validate-input
    permissions:
      contents: read
    environment:
      name: publish-preview
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HELPER_APP_ID }}
          private-key: ${{ secrets.DOC_HELPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.validate-input.outputs.repo_owner }}
          repositories: ${{ needs.validate-input.outputs.repo_name }}

      - name: Post build starting comment
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          SOURCE_REPO: ${{ needs.validate-input.outputs.source_repo }}
          PR_NUM: ${{ needs.validate-input.outputs.pr_number }}
          COMMIT_SHA: ${{ needs.validate-input.outputs.commit_sha }}
        run: |
          gh pr comment "${PR_NUM}" \
            --repo "${SOURCE_REPO}" \
            --body "🔄 Building documentation preview for commit \`${COMMIT_SHA:0:7}\`..."

  build-docs:
    runs-on: ubuntu-latest
    needs:
      - validate-input
      - post-comment-pre-build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout hub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clone all spokes
        env:
          SOURCE_REPO: ${{ needs.validate-input.outputs.source_repo }}
          COMMIT_SHA: ${{ needs.validate-input.outputs.commit_sha }}
        run: |
          bash scripts/clone-spokes.sh \
            --override-repo="$SOURCE_REPO" \
            --override-ref="$COMMIT_SHA"

      - name: Build docs
        env:
          SITE_URL: ${{ env.DEV_URL }}
          BASE_URL: /pr/${{ needs.validate-input.outputs.pr_number }}
        run: |
          npm ci
          npm run build
          echo "Build completed successfully"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ env.DEV_ROLE }}
          role-session-name: Github
          aws-region: us-east-1

      - name: Deploy to AWS
        env:
          bucket: ${{ env.DEV_BUCKET }}
          path: pr/${{ needs.validate-input.outputs.pr_number }}
        run: |
          set -f
          aws s3 sync --delete build "$bucket/$path"

  update-comment-success:
    runs-on: ubuntu-latest
    needs:
      - validate-input
      - post-comment-pre-build
      - build-docs
    permissions:
      contents: read
    environment:
      name: publish-preview
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HELPER_APP_ID }}
          private-key: ${{ secrets.DOC_HELPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.validate-input.outputs.repo_owner }}
          repositories: ${{ needs.validate-input.outputs.repo_name }}

      - name: Update deployment comment on PR
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          SOURCE_REPO: ${{ needs.validate-input.outputs.source_repo }}
          PR_NUM: ${{ needs.validate-input.outputs.pr_number }}
          COMMIT_SHA: ${{ needs.validate-input.outputs.commit_sha }}
        run: |
          echo "Updating build comment on $SOURCE_REPO PR #$PR_NUM..."
          PREVIEW_URL="${DEV_URL}/pr/${PR_NUM}/"
          gh pr comment "${PR_NUM}" \
            --repo "${SOURCE_REPO}" \
            --edit-last \
            --body "✅ Documentation preview deployed for commit \`${COMMIT_SHA:0:7}\`

          Preview: ${PREVIEW_URL}"
