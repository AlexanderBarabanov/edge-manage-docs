name: Change Detection
description: |
  Returns the list of components whose files changed in the current PR.
inputs:
  path_filter:
    description: 'Path to the components path-filter file'
    default: './.github/components-path-filters.yml'
    required: false

outputs:
  paths_list:
    description: 'JSON array of changed component keys'
    value: ${{ steps.components-list.outputs.paths_list }}

runs:
  using: composite
  steps:
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@2f7c5bfce28377bc069a65ba478de0a74aa0ca32 # v46.0.1
      with:
        files_yaml_from_source_file: ${{ inputs.path_filter }}

    - name: Build changed-components list
      id: components-list
      shell: bash
      env:
        CHANGED_KEYS: ${{ steps.changed-files.outputs.changed_keys }}
      run: |
        set -euo pipefail
        # changed_keys is space-separated; emit a JSON array for callers
        # that want to fan out, and individual `<component>_changed`
        # outputs are already exposed by tj-actions on the upstream step.
        paths_list=$(printf '%s\n' $CHANGED_KEYS | jq -R . | jq -sc .)
        echo "paths_list=$paths_list" >> "$GITHUB_OUTPUT"
