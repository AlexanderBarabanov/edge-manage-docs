name: Setup Build
description: |
  Checkout the hub repo, install Node.js 22, and run `npm ci`.
  Shared by every workflow that runs `npm run build` / `npx docusaurus build`.

runs:
  using: composite
  steps:
    - name: Checkout hub repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '22'

    - name: Install dependencies
      shell: bash
      run: npm ci
